<!doctype html>
<html lang="en" data-theme="dark" data-viewmode="auto" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>IRPG Offline</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" sizes="192x192" href="./icons/Fire_192.png">
  <link rel="icon" sizes="512x512" href="./icons/Fire_512.png">

  <link rel="stylesheet" href="./styles/app.css" />
</head>

<body>
  <header class="topbar">
    <button id="btnToc" class="iconbtn" title="Menu" aria-label="Open contents">☰</button>

    <div class="titlewrap">
      <div id="appTitle" class="apptitle">IRPG Offline</div>
      <div id="appSubtitle" class="subtitle">Version local</div>
    </div>

    <div class="topbar-actions">
      <div class="seg" role="tablist" aria-label="View mode">
        <button id="viewAuto" class="segbtn active" type="button">Auto</button>
        <button id="viewMobile" class="segbtn" type="button">Mobile</button>
        <button id="viewDesktop" class="segbtn" type="button">Desktop</button>
      </div>

      <button id="btnFocus" class="pill" type="button">Focus</button>
      <button id="btnTheme" class="pill" type="button">Dark</button>

      <button id="btnExportAll" class="pill" type="button">Export</button>

      <label class="pill filelabel" title="Import all app data">
        Import
        <input id="fileImportAll" type="file" accept="application/json" hidden />
      </label>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT: TOC -->
    <section id="tocPanel" class="panel toc">
      <div class="panelhead">
        <div class="tabs" role="tablist" aria-label="Left panel tabs">
          <button id="tabContents" class="tab active" type="button" aria-selected="true">Contents</button>
          <button id="tabBookmarks" class="tab" type="button" aria-selected="false">Bookmarks</button>
          <button id="tabHighlights" class="tab" type="button" aria-selected="false">Highlights</button>
        </div>
        <button id="btnCloseToc" class="iconbtn" title="Close" aria-label="Close panel">✕</button>
      </div>

      <div class="searchrow">
        <input id="tocSearch" class="search" placeholder="Search..." autocomplete="off" />
      </div>

      <div class="panelbody scrollcol">
        <div id="tocView" class="view">
          <div id="tocTree" class="list"></div>
        </div>

        <div id="bookmarksView" class="view hidden">
          <div class="searchrow inner">
            <input id="bookmarksSearch" class="search" placeholder="Search bookmarks..." autocomplete="off" />
          </div>
          <div id="bookmarksList" class="list"></div>
        </div>

        <div id="highlightsView" class="view hidden">
          <div class="emptyNote">
            Drag-select text in the PDF to highlight. Click a highlight to jump back.
          </div>
          <div id="highlightsList" class="list"></div>
        </div>
      </div>

      <div class="panelfoot smallmuted">
        No accounts. No analytics. Data stays on this device.
      </div>
    </section>

    <!-- CENTER: PDF -->
    <section class="panel viewer">
      <div class="viewerhead">
        <div class="viewerleft">
          <button id="btnPrev" class="pill" type="button">Prev</button>
          <button id="btnNext" class="pill" type="button">Next</button>
          <span id="pageReadout" class="pagenum">Page —</span>
        </div>
        <div class="viewerright">
          <button id="btnChecklist" class="pill" type="button">Checklist</button>
        </div>
      </div>

      <div id="pdfScroll" class="pdfScroll" aria-label="PDF viewer"></div>
    </section>

    <!-- RIGHT: CHECKLIST -->
    <section id="checklistPanel" class="panel checklist">
      <div class="panelhead">
        <div>
          <div class="paneltitle">Checklist</div>
          <div id="checklistHint" class="smallmuted">Select a checklist to begin.</div>
        </div>
        <button id="btnCloseChecklist" class="iconbtn" title="Close" aria-label="Close checklist">✕</button>
      </div>

      <div class="searchrow">
        <input id="checklistSearch" class="search" placeholder="Search checklists..." autocomplete="off" />
      </div>

      <div class="panelbody scrollcol checklistBody">
        <!-- Catalog -->
        <div id="checklistCatalog" class="list checklistCatalog"></div>

        <!-- Form -->
        <div id="checklistFormWrap" class="hidden checklistFormWrap">
          <div class="formTop">
            <button id="btnChecklistBack" class="pill ghost" type="button">← Change checklist</button>
            <div id="checklistTitle" class="formTitle">—</div>
          </div>
          <div id="checklistForm" class="form"></div>
        </div>
      </div>

      <div class="panelfoot">
        <div class="footerRow">
          <button id="btnResetChecklist" class="pill danger" type="button">Reset</button>
          <button id="btnExportChecklistWord" class="pill" type="button">Export Word</button>
          <button id="btnExportChecklistJson" class="pill" type="button">Export JSON</button>
          <label class="pill filelabel" title="Import checklist JSON">
            Import JSON
            <input id="fileImportChecklistJson" type="file" accept="application/json" hidden />
          </label>
        </div>
        <div class="smallmuted" style="padding-top:8px">
          Tip: “Set” buttons (GPS/Date/Time) work best on HTTPS or localhost.
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
